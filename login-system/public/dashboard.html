<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./main.css">
  <script src="./dashboard.js" defer></script>
  <title>CatNet</title>
</head>
<body>



 <!-- NAVBAR -->
<div class="navbar">
  <div class="site-name"><span>Cat</span>Net</div>
  <div class="navbar-buttons">
    <button id="create-post-btn">+ Create Post</button>
    <button id="logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
  <h2 id="dashboard-welcome"></h2>
  <div id="posts-container"></div>
</div>

<!-- POST MODAL -->
<div class="modal" id="post-modal">
  <div class="modal-content">
    <input type="text" id="post-title" placeholder="Post title" />
    <textarea id="post-content" rows="3" placeholder="Write your post..."></textarea>
    <input type="file" id="post-image" accept="image/*" />
    <button id="submit-post-btn">Submit Post</button>
    <button id="cancel-post-btn">Cancel</button>
  </div>
</div>

  </div>
</div>
<!-- ===== FOOTER ===== -->
<footer class="footer">
  <p>&copy; 2026 <span>CatNet</span>. All rights reserved.</p>
  <p>Made with :3 by Nullchan</p>
</footer>

</body>
</html>
